services:
  workspace:
    build: .
    container_name: bigdata_workspace_final
    ports:
      - "8888:8888"   # Jupyter Lab
      - "6080:6080"   # Visualizador del Scraper (VNC)
      - "4040:4040"   # Spark UI
    volumes:
      - .:/home/jovyan/work
    environment:
      - JUPYTER_TOKEN=
      - JUPYTER_PASSWORD="iicg2026"
      - JUPYTER_ALLOW_INSECURE_WRITES=true
      - JUPYTER_ENABLE_LAB=yes
    dns:
      - 8.8.8.8
    user: root
    restart: always
    networks:
      - bigdata_net

  # Base de Datos NoSQL Local
  database:
    image: mongo:latest
    container_name: bigdata_mongodb1
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - bigdata_net

  # Mongo Express (Visualizador)
  visualizer:
    image: mongo-express
    container_name: BigData_Visualizer
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb+srv://usuario:password@cluster0.kthdyh1.mongodb.net/?retryWrites=true&w=majority
      - ME_CONFIG_MONGODB_ENABLE_ADMIN=true
      - VC_NODE_TLS_REJECT_UNAUTHORIZED=0
    dns:
      - 8.8.8.8
    restart: always
    networks:
      - bigdata_net

  filebrowser:
    image: filebrowser/filebrowser
    container_name: BigData_FileBrowser
    ports:
      - "8082:80"
    volumes:
      - .:/srv
    restart: always
    networks:
      - bigdata_net

volumes:
  mongo_data:

networks:
  bigdata_net:
    driver: bridge
    name: BigData_Network_UCN