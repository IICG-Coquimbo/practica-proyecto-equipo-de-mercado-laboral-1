  # ─────────────────────────────────────────────
  # Visualizador de MongoDB (Mongo Express)
  # ─────────────────────────────────────────────
  admin-db:
    image: mongo-express
    container_name: BigData_Visualizer
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://mongodb:27017/
      - ME_CONFIG_MONGODB_ENABLE_ADMIN=true
    dns:
      - 8.8.8.8
    restart: always
    depends_on:
      - mongodb
    networks:
      - bigdata_net

  # ─────────────────────────────────────────────
  # Gestor de archivos web
  # ─────────────────────────────────────────────
  filebrowser:
    image: filebrowser/filebrowser
    container_name: BigData_FileBrowser
    ports:
      - "8082:80"
    volumes:
      - .:/srv
    restart: always
    networks:
      - bigdata_net

volumes:
  mongo_data:

networks:
  bigdata_net:
    driver: bridge
    name: BigData_Network_UCN