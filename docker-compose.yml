services:

  # ─────────────────────────────────────────────
  # Entorno principal: Jupyter + PySpark + Selenium
  # ─────────────────────────────────────────────
  workspace:
    build: .
    container_name: BigData_workspace
    ports:
      - "8888:8888"   # Jupyter Lab
      - "6080:6080"   # Visualizador VNC (scraping dinamico)
      - "4040:4040"   # Spark UI
    volumes:
      - .:/home/jovyan/work
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - JUPYTER_TOKEN=bigdata
      - JUPYTER_ALLOW_INSECURE_WRITES=true
      - DISPLAY=:99
    shm_size: "2gb"
    dns:
      - 8.8.8.8
    user: root
    restart: always
    depends_on:
      - mongodb
    networks:
      - bigdata_net

  # ─────────────────────────────────────────────
  # Base de Datos NoSQL local (MongoDB)
  # ─────────────────────────────────────────────
